name: Release

# Go modules don't have a separate package registry — Go's tooling
# resolves `github.com/SocialAPIsHub/socialapis-go@vX.Y.Z` directly
# from the git tag. So a "release" is just:
#   1. Run tests one more time as a safety net
#   2. Create a GitHub Release with the CHANGELOG entry
#
# After this workflow, the module is immediately installable:
#   go get github.com/SocialAPIsHub/socialapis-go@vX.Y.Z

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file_version=$(grep -E '^const Version = "[^"]+"' version.go | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$file_version" ]; then
            echo "::error::Tag ${tag} does not match version.go const ${file_version}"
            exit 1
          fi
      - name: Run tests
        run: go test ./...
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
